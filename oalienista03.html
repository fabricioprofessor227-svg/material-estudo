<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📘 O Alienista · Parte 3 (Final)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        .page-header { margin-bottom: 12px; }
        .page-header h1 { font-size: 1.7rem; font-weight: 700; color: #0f3d2e; line-height: 1.2; margin-bottom: 6px; }
        .progress-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; font-weight: 600; color: #1a5e44; margin-bottom: 6px; }
        .progress-bar-bg { background: #dee6e1; height: 7px; border-radius: 20px; overflow: hidden; }
        .progress-fill { background: #1a7a58; height: 7px; width: 0%; border-radius: 20px; transition: width 0.2s; }
        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
        }
        .text-content p { margin-bottom: 1em; }
        .toolbar-single {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            overflow-x: auto;
            padding: 4px 0 8px;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 12px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; pointer-events: none; }
        .report-box { background: #f0f7f3; border-radius: 24px; padding: 24px 18px; margin: 20px 0; }
        .report-line { font-size: 1.1rem; margin-bottom: 14px; border-bottom: 1px dashed #9dbbae; padding-bottom: 8px; }
        .print-btn { background: #1e5e44; color: white; border: none; padding: 18px 20px; font-size: 1.3rem; border-radius: 60px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .nav-btn {
            background: #e6f0ea;
            border: 1.5px solid #a2bfb1;
            padding: 16px 18px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            color: #1a4e3a;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div id="readerScreen" class="screen active">
        <div class="page-header">
            <h1>O Alienista</h1>
            <div class="progress-row">
                <span id="pageXofY">Página 7 de 9</span>
                <span id="progressPercent">77%</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-fill" id="progressFill" style="width: 77%"></div></div>
        </div>
        <div class="text-content" id="pageContent"></div>
        <div class="toolbar-single">
            <button class="tool-btn" id="fontMinusBtn">A−</button>
            <button class="tool-btn" id="fontPlusBtn">A+</button>
            <button class="tool-btn" id="voiceToggleBtn">Fem</button>
            <button class="tool-btn" id="rateToggleBtn">1x</button>
            <button class="tool-btn" id="fullscreenBtn">⛶</button>
            <button class="tool-btn" id="speakBtn">🔊</button>
            <button class="tool-btn" id="pauseBtn">⏸️</button>
            <button class="tool-btn" id="stopBtn">⏹️</button>
            <button class="tool-btn" id="prevBtnInline">◀</button>
            <button class="tool-btn" id="nextBtnInline">▶</button>
        </div>
    </div>

    <div id="reportScreen" class="screen">
        <h2 style="color:#0f3d2e; margin-bottom: 20px;">📋 Relatório de Leitura</h2>
        <div class="report-box" id="reportContent"></div>
        <button class="print-btn" id="printPdfBtn">🖨️ Imprimir / Salvar PDF</button>
        <button class="nav-btn" id="closeReportBtn">🔚 Encerrar</button>
    </div>

    <div id="finalScreen" class="screen">
        <h2 style="color:#0f3d2e; text-align: center;">✅ Pode fechar a janela.</h2>
        <p style="text-align: center; margin-top: 20px;">Leitura concluída com sucesso!</p>
    </div>
</div>

<script>
    (function(){
        const pageContents = [
            `<p><strong>CAPÍTULO III - DEUS SABE O QUE FAZ</strong></p>
            <p>A ilustre dama, no fim de dois meses, achou-se a mais desgraçada das mulheres: caiu em profunda melancolia, ficou amarela, magra, comia pouco e suspirava a cada canto. Não ousava fazer-lhe nenhuma queixa ou reproche, porque respeitava nele o seu marido e senhor, mas padecia calada, e definhava a olhos vistos. Um dia, ao jantar, como lhe perguntasse o marido o que é que tinha, respondeu tristemente que nada; depois atreveu-se um pouco, e foi ao ponto de dizer que se considerava tão viúva como dantes. E acrescentou:</p>
            <p>—Quem diria nunca que meia dúzia de lunáticos...</p>
            <p>Não acabou a frase; ou antes, acabou-a levantando os olhos ao teto — os olhos, que eram a sua feição mais insinuante — negros, grandes, lavados de uma luz úmida, como os da aurora. Quanto ao gesto, era o mesmo que empregara no dia em que Simão Bacamarte a pediu em casamento. Não dizem as crônicas se D. Evarista brandiu aquela arma com o perverso intuito de degolar de uma vez a ciência, ou, pelo menos, decepar-lhe as mãos; mas a conjetura é verossímil. Em todo caso, o alienista não lhe atribuiu intenção. E não se irritou o grande homem, não ficou sequer consternado. O metal de seus olhos não deixou de ser o mesmo metal, duro, liso, eterno, nem a menor prega veio quebrar a superfície da fronte quieta como a água de Botafogo. Talvez um sorriso lhe descerrou os lábios, por entre os quais filtrou esta palavra macia como o óleo do Cântico:</p>
            <p>—Consinto que vás dar um passeio ao Rio de Janeiro.</p>
            <p>D. Evarista sentiu faltar-lhe o chão debaixo dos pés. Nunca dos nuncas vira o Rio de Janeiro, que posto não fosse sequer uma pálida sombra do que hoje é, todavia era alguma coisa mais do que Itaguaí. Ver o Rio de Janeiro, para ela, equivalia ao sonho do hebreu cativo. Agora, principalmente, que o marido assentara de vez naquela povoação interior, agora é que ela perdera as últimas esperanças de respirar os ares da nossa boa cidade; e justamente agora é que ele a convidava a realizar os seus desejos de menina e moça.</p>`,
            
            `<p>D. Evarista não pôde dissimular o gosto de semelhante proposta. Simão Bacamarte pagou-lhe na mão e sorriu — um sorriso tanto ou quanto filosófico, além de conjugal, em que parecia traduzir-se este pensamento: "Não há remédio certo para as dores da alma; esta senhora definha, porque lhe parece que a não amo; dou-lhe o Rio de Janeiro, e consola-se". E porque era homem estudioso tomou nota da observação.</p>
            <p>Mas um dardo atravessou o coração de D. Evarista. Conteve-se, entretanto; limitou-se a dizer ao marido que, se ele não ia, ela não iria também, porque não havia de meter-se sozinha pelas estradas.</p>
            <p>—Irá com sua tia, redargüiu o alienista.</p>
            <p>Note-se que D. Evarista tinha pensado nisso mesmo; mas não quisera pedi-lo nem insinuá-lo, em primeiro lugar porque seria impor grandes despesas ao marido, em segundo lugar porque era melhor, mais metódico e racional que a proposta viesse dele.</p>
            <p>—Oh! mas o dinheiro que será preciso gastar! suspirou D. Evarista sem convicção.</p>
            <p>—Que importa? Temos ganho muito, disse o marido. Ainda ontem o escriturário prestou-me contas. Queres ver?</p>
            <p>E levou-a aos livros. D. Evarista ficou deslumbrada. Era uma via-láctea de algarismos. E depois levou-a às arcas, onde estava o dinheiro. Deus! eram montes de ouro, eram mil cruzados sobre mil cruzados, dobrões sobre dobrões; era a opulência.</p>
            <p>Enquanto ela comia o ouro com os seus olhos negros, o alienista fitava-a, e dizia-lhe ao ouvido com a mais pérfida das alusões:</p>
            <p>—Quem diria que meia dúzia de lunáticos...</p>
            <p>D. Evarista compreendeu, sorriu e respondeu com muita resignação:</p>
            <p>—Deus sabe o que faz!</p>`,
            
            `<p>Três meses depois efetuava-se a jornada. D. Evarista, a tia, a mulher do boticário, um sobrinho deste, um padre que o alienista conhecera em Lisboa, e que de aventura achava-se em Itaguaí, cinco ou seis pajens, quatro mucamas, tal foi a comitiva que a população viu dali sair em certa manhã do mês de maio. As despedidas foram tristes para todos, menos para o alienista. Conquanto as lágrimas de D. Evarista fossem abundantes e sinceras, não chegaram a abalá-lo. Homem de ciência, e só de ciência, nada o consternava fora da ciência; e se alguma coisa o preocupava naquela ocasião, se ele deixava correr pela multidão um olhar inquieto e policial, não era outra coisa mais do que a idéia de que algum demente podia achar-se ali misturado com a gente de juízo.</p>
            <p>—Adeus! soluçaram enfim as damas e o boticário.</p>
            <p>E partiu a comitiva. Crispim Soares, ao tornar a casa, trazia os olhos entre as duas orelhas da besta ruana em que vinha montado; Simão Bacamarte alongava os seus pelo horizonte adiante, deixando ao cavalo a responsabilidade do regresso. Imagem vivaz do gênio e do vulgo! Um fita o presente, com todas as suas lágrimas e saudades, outro devassa o futuro com todas as suas auroras.</p>
            <p><em>Fim.</em></p>`
        ];

        let currentPage = 0;
        let fontSizeIndex = 2;
        const fontSizes = [16, 26, 36, 48, 56];
        let rateIndex = 0;
        const rates = [1, 1.3, 1.5];
        
        const synth = window.speechSynthesis;
        let utterance = null;
        let autoTimer = null;

        const readerScr = document.getElementById('readerScreen');
        const reportScr = document.getElementById('reportScreen');
        const finalScr = document.getElementById('finalScreen');
        const pageContentEl = document.getElementById('pageContent');
        const pageXofY = document.getElementById('pageXofY');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const voiceToggle = document.getElementById('voiceToggleBtn');
        const rateToggle = document.getElementById('rateToggleBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const speakBtn = document.getElementById('speakBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const prevInline = document.getElementById('prevBtnInline');
        const nextInline = document.getElementById('nextBtnInline');
        const printPdfBtn = document.getElementById('printPdfBtn');
        const closeReportBtn = document.getElementById('closeReportBtn');
        const reportContentDiv = document.getElementById('reportContent');

        function getGlobalPageNumber() { return currentPage + 7; }
        
        function updateUI() {
            pageContentEl.innerHTML = pageContents[currentPage];
            const num = getGlobalPageNumber();
            pageXofY.textContent = `Página ${num} de 9`;
            const pct = (num / 9) * 100;
            progressFill.style.width = pct + '%';
            progressPercent.textContent = Math.round(pct) + '%';
            prevInline.disabled = (currentPage === 0);
            applyFontSizeToAll();
        }

        function applyFontSizeToAll() {
            pageContentEl.style.fontSize = fontSizes[fontSizeIndex] + 'px';
            fontMinus.disabled = (fontSizeIndex === 0);
            fontPlus.disabled = (fontSizeIndex === fontSizes.length - 1);
        }

        function stopSpeaking(resetTimer = true) {
            synth.cancel();
            if (autoTimer) clearTimeout(autoTimer);
            autoTimer = null;
        }

        function speakPage() {
            stopSpeaking(true);
            const text = pageContentEl.innerText;
            utterance = new SpeechSynthesisUtterance(text);
            const vozes = synth.getVoices();
            utterance.voice = vozes.find(v => v.lang === 'pt-BR') || vozes[0];
            utterance.rate = rates[rateIndex];
            utterance.onend = () => {
                if (currentPage === 2) return;
                autoTimer = setTimeout(() => {
                    if (currentPage < 2) {
                        currentPage++;
                        updateUI();
                        speakPage();
                    }
                }, 6000);
            };
            synth.speak(utterance);
        }

        function goToPage(newIdx) {
            if (newIdx < 0 || newIdx >= 3) return;
            stopSpeaking(true);
            currentPage = newIdx;
            updateUI();
        }

        currentPage = 0;
        updateUI();

        prevInline.addEventListener('click', () => {
            if (currentPage === 0) {
                window.location.href = 'https://fabricioprofessor227-svg.github.io/material-estudo/oalienista02.html';
            } else {
                goToPage(currentPage - 1);
            }
        });
        
        nextInline.addEventListener('click', () => {
            if (currentPage === 2) {
                // Gera relatório e finaliza
                const fim = new Date();
                const nome = localStorage.getItem('alunoNome') || 'Não informado';
                const turma = localStorage.getItem('alunoTurma') || 'Não informada';
                const bimestre = localStorage.getItem('alunoBimestre') || 'Não informado';
                const inicioStr = localStorage.getItem('inicioLeitura');
                
                let duracao = 'Não disponível';
                if (inicioStr) {
                    const inicio = new Date(inicioStr);
                    const diffMin = Math.round((fim - inicio) / 60000);
                    duracao = `${diffMin} minuto(s)`;
                }
                
                reportContentDiv.innerHTML = `
                    <div class="report-line"><strong>👤 Aluno:</strong> ${nome}</div>
                    <div class="report-line"><strong>📌 Turma:</strong> ${turma} &nbsp;|&nbsp; <strong>Bimestre:</strong> ${bimestre}</div>
                    <div class="report-line"><strong>🏁 Hora de conclusão:</strong> ${fim.toLocaleString('pt-BR')}</div>
                    <div class="report-line"><strong>📖 Páginas lidas:</strong> 9 de 9</div>
                    <div class="report-line"><strong>⏳ Duração total:</strong> ${duracao}</div>
                    <div class="report-line"><strong>📘 Obra:</strong> O Alienista (Machado de Assis)</div>
                `;
                readerScr.classList.remove('active');
                reportScr.classList.add('active');
            } else {
                goToPage(currentPage + 1);
            }
        });
        
        printPdfBtn.addEventListener('click', () => window.print());
        
        closeReportBtn.addEventListener('click', () => {
            reportScr.classList.remove('active');
            finalScr.classList.add('active');
        });
        
        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSizeToAll(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length - 1) fontSizeIndex++; applyFontSizeToAll(); });
        voiceToggle.addEventListener('click', () => {});
        rateToggle.addEventListener('click', () => { rateIndex = (rateIndex + 1) % rates.length; rateToggle.textContent = rateIndex === 0 ? '1x' : (rateIndex === 1 ? '1.3x' : '1.5x'); });
        fullscreenBtn.addEventListener('click', () => { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); });
        speakBtn.addEventListener('click', speakPage);
        pauseBtn.addEventListener('click', () => { if (synth.speaking) synth.paused ? synth.resume() : synth.pause(); });
        stopBtn.addEventListener('click', () => stopSpeaking(true));
        
        applyFontSizeToAll();
    })();
</script>
</body>
</html>
