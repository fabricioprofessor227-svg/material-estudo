<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📘 O Alienista · Parte 2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        .page-header { margin-bottom: 12px; }
        .page-header h1 { font-size: 1.7rem; font-weight: 700; color: #0f3d2e; line-height: 1.2; margin-bottom: 6px; }
        .progress-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; font-weight: 600; color: #1a5e44; margin-bottom: 6px; }
        .progress-bar-bg { background: #dee6e1; height: 7px; border-radius: 20px; overflow: hidden; }
        .progress-fill { background: #1a7a58; height: 7px; width: 0%; border-radius: 20px; transition: width 0.2s; }
        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
        }
        .text-content p { margin-bottom: 1em; }
        .toolbar-single {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            overflow-x: auto;
            padding: 4px 0 8px;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 12px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; pointer-events: none; }
        .nav-btn {
            background: #e6f0ea;
            border: 1.5px solid #a2bfb1;
            padding: 16px 18px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            color: #1a4e3a;
            margin-top: 10px;
        }
        .nav-btn:active { background: #cde0d6; }
        .btn-primary {
            background: #1a5e44;
            color: white;
            border: none;
            padding: 18px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div id="readerScreen" class="screen active">
        <div class="page-header">
            <h1>O Alienista</h1>
            <div class="progress-row">
                <span id="pageXofY">Página 4 de 9</span>
                <span id="progressPercent">44%</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-fill" id="progressFill" style="width: 44%"></div></div>
        </div>
        <div class="text-content" id="pageContent"></div>
        <div class="toolbar-single">
            <button class="tool-btn" id="fontMinusBtn">A−</button>
            <button class="tool-btn" id="fontPlusBtn">A+</button>
            <button class="tool-btn" id="voiceToggleBtn">Fem</button>
            <button class="tool-btn" id="rateToggleBtn">1x</button>
            <button class="tool-btn" id="fullscreenBtn">⛶</button>
            <button class="tool-btn" id="speakBtn">🔊</button>
            <button class="tool-btn" id="pauseBtn">⏸️</button>
            <button class="tool-btn" id="stopBtn">⏹️</button>
            <button class="tool-btn" id="prevBtnInline">◀</button>
            <button class="tool-btn" id="nextBtnInline">▶</button>
        </div>
    </div>

    <div id="optionsScreen" class="screen">
        <h2 style="color:#0f3d2e; margin-bottom: 20px;">📖 Fim da Parte 2</h2>
        <button class="btn-primary" id="nextPartBtn">▶ Próxima Parte</button>
        <button class="nav-btn" id="restartBtn">🔄 Refazer leitura</button>
    </div>
</div>

<script>
    (function(){
        const pageContents = [
            `<p><strong>CAPÍTULO II - TORRENTES DE LOUCOS</strong></p>
            <p>Três dias depois, numa expansão íntima com o boticário Crispim Soares, desvendou o alienista o mistério do seu coração.</p>
            <p>—A caridade, Sr. Soares, entra decerto no meu procedimento, mas entra como tempero, como o sal das coisas, que é assim que interpreto o dito de São Paulo aos Coríntios: "Se eu conhecer quanto se pode saber, e não tiver caridade, não sou nada". O principal nesta minha obra da Casa Verde é estudar profundamente a loucura, os seus diversos graus, classificar-lhe os casos, descobrir enfim a causa do fenômeno e o remédio universal. Este é o mistério do meu coração. Creio que com isto presto um bom serviço à humanidade.</p>
            <p>—Um excelente serviço, corrigiu o boticário.</p>
            <p>—Sem este asilo, continuou o alienista, pouco poderia fazer; ele dá-me, porém, muito maior campo aos meus estudos.</p>
            <p>—Muito maior, acrescentou o outro.</p>
            <p>E tinha razão. De todas as vilas e arraiais vizinhos afluíam loucos à Casa Verde. Eram furiosos, eram mansos, eram monomaníacos, era toda a família dos deserdados do espírito. Ao cabo de quatro meses, a Casa Verde era uma povoação. Não bastaram os primeiros cubículos; mandou-se anexar uma galeria de mais trinta e sete. O Padre Lopes confessou que não imaginara a existência de tantos doidos no mundo, e menos ainda o inexplicável de alguns casos. Um, por exemplo, um rapaz bronco e vilão, que todos os dias, depois do almoço, fazia regularmente um discurso acadêmico, ornado de tropos, de antíteses, de apóstrofes, com seus recamos de grego e latim, e suas borlas de Cícero, Apuleio e Tertuliano. O vigário não queria acabar de crer. Quê! um rapaz que ele vira, três meses antes, jogando peteca na rua!</p>
            <p>—Não digo que não, respondia-lhe o alienista; mas a verdade é o que Vossa Reverendíssima está vendo. Isto é todos os dias.</p>`,
            
            `<p>Os loucos por amor eram três ou quatro, mas só dois espantavam pelo curioso do delírio. O primeiro, um Falcão, rapaz de vinte e cinco anos, supunha-se estrela-d’alva, abria os braços e alargava as pernas, para dar-lhes certa feição de raios, e ficava assim horas esquecidas a perguntar se o sol já tinha saído para ele recolher-se. O outro andava sempre, sempre, sempre, à roda das salas ou do pátio, ao longo dos corredores, à procura do fim do mundo. Era um desgraçado, a quem a mulher deixou por seguir um peralvilho. Mal descobrira a fuga, armou-se de uma garrucha, e saiu-lhes no encalço; achou-os duas horas depois, ao pé de uma lagoa, matou-os a ambos com os maiores requintes de crueldade.</p>
            <p>O ciúme satisfez-se, mas o vingado estava louco. E então começou aquela ânsia de ir ao fim do mundo à cata dos fugitivos.</p>
            <p>A mania das grandezas tinha exemplares notáveis. O mais notável era um pobre-diabo, filho de um algibebe, que narrava às paredes (porque não olhava nunca para nenhuma pessoa) toda a sua genealogia, que era esta:</p>
            <p>—Deus engendrou um ovo, o ovo engendrou a espada, a espada engendrou Davi, Davi engendrou a púrpura, a púrpura engendrou o duque, o duque engendrou o marquês, o marquês engendrou o conde, que sou eu.</p>
            <p>Dava uma pancada na testa, um estalo com os dedos, e repetia cinco, seis vezes seguidas: —Deus engendrou um ovo, o ovo, etc.</p>
            <p>Outro da mesma espécie era um escrivão, que se vendia por mordomo do rei; outro era um boiadeiro de Minas, cuja mania era distribuir boiadas a toda a gente, dava trezentas cabeças a um, seiscentas a outro, mil e duzentas a outro, e não acabava mais.</p>`,
            
            `<p>Não falo dos casos de monomania religiosa; apenas citarei um sujeito que, chamando-se João de Deus, dizia agora ser o deus João, e prometia o reino dos céus a quem o adorasse, e as penas do inferno aos outros; e depois desse, o licenciado Garcia, que não dizia nada, porque imaginava que no dia em que chegasse a proferir uma só palavra, todas as estrelas se despegariam do céu e abrasariam a terra; tal era o poder que recebera de Deus.</p>
            <p>Assim o escrevia ele no papel que o alienista lhe mandava dar, menos por caridade do que por interesse científico.</p>
            <p>Que, na verdade, a paciência do alienista era ainda mais extraordinária do que todas as manias hospedadas na Casa Verde; nada menos que assombrosa. Simão Bacamarte começou por organizar um pessoal de administração; e, aceitando essa idéia ao boticário Crispim Soares, aceitou-lhe também dois sobrinhos, a quem incumbiu da execução de um regimento que lhes deu, aprovado pela Câmara, da distribuição da comida e da roupa, e assim também da escrita, etc. Era o melhor que podia fazer, para somente cuidar do seu ofício.</p>
            <p>—A Casa Verde, disse ele ao vigário, é agora uma espécie de mundo, em que há o governo temporal e o governo espiritual.</p>
            <p>E o Padre Lopes ria deste pio trocado — e acrescentava, — com o único fim de dizer também uma chalaça: —Deixe estar, deixe estar, que hei de mandá-lo denunciar ao papa.</p>
            <p>Uma vez desonerado da administração, o alienista procedeu a uma vasta classificação dos seus enfermos. Dividiu-os primeiramente em duas classes principais: os furiosos e os mansos; daí passou às subclasses, monomanias, delírios, alucinações diversas.</p>
            <p>Isto feito, começou um estudo aturado e contínuo; analisava os hábitos de cada louco, as horas de acesso, as aversões, as simpatias, as palavras, os gestos, as tendências; inquiria da vida dos enfermos, profissão, costumes, circunstâncias da revelação mórbida, acidentes da infância e da mocidade, doenças de outra espécie, antecedentes na família, uma devassa, enfim, como a não faria o mais atilado corregedor.</p>`
        ];

        let currentPage = 0;
        let fontSizeIndex = 2;
        const fontSizes = [16, 26, 36, 48, 56];
        let rateIndex = 0;
        const rates = [1, 1.3, 1.5];
        
        const synth = window.speechSynthesis;
        let utterance = null;
        let autoTimer = null;

        // DOM elements
        const readerScr = document.getElementById('readerScreen');
        const optionsScr = document.getElementById('optionsScreen');
        const pageContentEl = document.getElementById('pageContent');
        const pageXofY = document.getElementById('pageXofY');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const voiceToggle = document.getElementById('voiceToggleBtn');
        const rateToggle = document.getElementById('rateToggleBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const speakBtn = document.getElementById('speakBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const prevInline = document.getElementById('prevBtnInline');
        const nextInline = document.getElementById('nextBtnInline');
        const nextPartBtn = document.getElementById('nextPartBtn');
        const restartBtn = document.getElementById('restartBtn');

        function getGlobalPageNumber() { return currentPage + 4; }
        
        function updateUI() {
            pageContentEl.innerHTML = pageContents[currentPage];
            const num = getGlobalPageNumber();
            pageXofY.textContent = `Página ${num} de 9`;
            const pct = (num / 9) * 100;
            progressFill.style.width = pct + '%';
            progressPercent.textContent = Math.round(pct) + '%';
            prevInline.disabled = (currentPage === 0);
            applyFontSizeToAll();
        }

        function applyFontSizeToAll() {
            pageContentEl.style.fontSize = fontSizes[fontSizeIndex] + 'px';
            fontMinus.disabled = (fontSizeIndex === 0);
            fontPlus.disabled = (fontSizeIndex === fontSizes.length - 1);
        }

        function stopSpeaking(resetTimer = true) {
            synth.cancel();
            if (autoTimer) clearTimeout(autoTimer);
            autoTimer = null;
        }

        function speakPage() {
            stopSpeaking(true);
            const text = pageContentEl.innerText;
            utterance = new SpeechSynthesisUtterance(text);
            const vozes = synth.getVoices();
            utterance.voice = vozes.find(v => v.lang === 'pt-BR') || vozes[0];
            utterance.rate = rates[rateIndex];
            utterance.onend = () => {
                if (currentPage === 2) return;
                autoTimer = setTimeout(() => {
                    if (currentPage < 2) {
                        currentPage++;
                        updateUI();
                        speakPage();
                    }
                }, 6000);
            };
            synth.speak(utterance);
        }

        function goToPage(newIdx) {
            if (newIdx < 0 || newIdx >= 3) return;
            stopSpeaking(true);
            currentPage = newIdx;
            updateUI();
        }

        readerScr.classList.add('active');
        currentPage = 0;
        updateUI();

        prevInline.addEventListener('click', () => {
            if (currentPage === 0) {
                window.location.href = 'https://fabricioprofessor227-svg.github.io/material-estudo/oalienista01.html';
            } else {
                goToPage(currentPage - 1);
            }
        });
        
        nextInline.addEventListener('click', () => {
            if (currentPage === 2) {
                stopSpeaking(true);
                readerScr.classList.remove('active');
                optionsScr.classList.add('active');
            } else {
                goToPage(currentPage + 1);
            }
        });
        
        nextPartBtn.addEventListener('click', () => {
            window.location.href = 'https://fabricioprofessor227-svg.github.io/material-estudo/oalienista03.html';
        });
        
        restartBtn.addEventListener('click', () => {
            stopSpeaking(true);
            currentPage = 0;
            updateUI();
            optionsScr.classList.remove('active');
            readerScr.classList.add('active');
        });
        
        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSizeToAll(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length - 1) fontSizeIndex++; applyFontSizeToAll(); });
        voiceToggle.addEventListener('click', () => {});
        rateToggle.addEventListener('click', () => { rateIndex = (rateIndex + 1) % rates.length; rateToggle.textContent = rateIndex === 0 ? '1x' : (rateIndex === 1 ? '1.3x' : '1.5x'); });
        fullscreenBtn.addEventListener('click', () => { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); });
        speakBtn.addEventListener('click', speakPage);
        pauseBtn.addEventListener('click', () => { if (synth.speaking) synth.paused ? synth.resume() : synth.pause(); });
        stopBtn.addEventListener('click', () => stopSpeaking(true));
        
        applyFontSizeToAll();
    })();
</script>
</body>
</html>
