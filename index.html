            text: `O que um indivíduo tem a ver com as mudanças climáticas? O que a cultura tem a ver com os desastres ambientais? E a ética, onde entra nessa história?

Pois é. Essas perguntas, aparentemente simples, revelam um emaranhado de relações que poucos enxergam. A verdade é que não existe problema ambiental isolado. Cada enchente, cada seca, cada deslizamento é também um problema social. Cada escolha de consumo, cada hábito cotidiano é também uma decisão ética.

Este texto convida você a olhar para trás do palco. A enxergar as conexões invisíveis entre o que consumimos, como nos organizamos em sociedade, onde moramos e como tratamos o planeta.

Vamos juntos explorar quatro dimensões essenciais desse debate:

2. Os riscos e desastres que nos espreitam — e por que uns são mais vulneráveis que outros.
3. As mudanças climáticas que já não são mais ameaça, mas realidade — e os acordos internacionais para enfrentá-las.
4. A segregação que divide nossas cidades — e como ela amplifica a vulnerabilidade ambiental.

Ao final, uma conclusão que amarra esses quatro fios. Mas, spoiler: o fio mais importante talvez esteja na sua mão. Vamos?`

        {

            text: `Vamos começar pelo começo: o que você comeu hoje no café da manhã?

Pode parecer uma pergunta trivial. Mas pense comigo. A fruta que você comeu foi produzida onde? Quanto recurso hídrico foi necessário para cultivá-la? Ela viajou quantos quilômetros até chegar na sua mesa? E a embalagem, para onde vai depois que você a descarta?

Pois é. Todo consumo é um ato ambiental. Mesmo quando não percebemos.

Os impactos socioambientais são exatamente isso: as consequências — positivas ou negativas — que nossas atividades econômicas e nossos hábitos de consumo geram tanto no meio ambiente quanto nas pessoas.

E aqui vai um dado para assustar (mas não para desanimar): segundo a ONU, se toda a população mundial consumisse como um brasileiro médio, precisaríamos de 1,6 planetas Terra por ano. Se consumisse como um norte-americano, seriam 5 planetas.

A conta não fecha. Literalmente.

O QUE SÃO PADRÕES DE CONSUMO?

Padrões de consumo são os "jeitos" que uma sociedade desenvolve para produzir, distribuir, usar e descartar bens e serviços. Eles variam no tempo e no espaço.

Na década de 1950, uma família brasileira média tinha: um rádio, talvez uma geladeira, poucas roupas, alimentos produzidos localmente. O lixo era orgânico, e o que sobrava virava adubo.

Hoje, a mesma família tem: smartphones (que trocam a cada 2 anos), TVs, computadores, eletrodomésticos, roupas de fast fashion (usadas poucas vezes), alimentos processados embalados em plástico. O lixo é químico, eletrônico, indestrutível.

O que mudou? Não a natureza humana. Mudou o padrão de consumo. E com ele, os impactos.

OS IMPACTOS

HÁBITOS SUSTENTÁVEIS

Agora, a boa notícia (porque precisa ter boa notícia, senão ninguém aguenta).

Hábitos sustentáveis são práticas cotidianas que reduzem os impactos negativos do nosso consumo. E o melhor: não exigem heroísmo.

Exemplos: repensar antes de comprar; reduzir o uso de plástico; reciclar e compostar; consumir local e sazonal; economizar água e energia.

Parecem pequenas coisas. E são. Mas pequenas coisas, feitas por milhões de pessoas, viram grandes transformações.

Ah, e um detalhe importante: sustentabilidade não é só sobre o meio ambiente. É também sobre justiça social. Um hábito sustentável de verdade é aquele que não prejudica ninguém — nem o planeta, nem os outros humanos.

"Mas, e se eu fizer tudo isso, ainda vou ver notícias de desmatamento, de queimadas, de rios poluídos. De que adianta?"

Ótima pergunta. Vamos para o próximo subtema.`

        {
            title: "3. RISCOS E DESASTRES: VULNERABILIDADE E INSEGURANÇA AMBIENTAL",
            text: `Agora vamos falar do que ninguém gosta de falar: o dia em que o problema bate na porta.

Risco e desastre não são a mesma coisa. E entender a diferença entre eles é o primeiro passo para não ser pego de surpresa.

O QUE É RISCO AMBIENTAL?

Risco é a probabilidade de um evento adverso acontecer. Ele existe o tempo todo, mesmo quando não vemos. Exemplo: morar perto de um rio é, em si, um risco. Porque o rio pode encher. Mas o risco não é certeza. É possibilidade.

O que transforma risco em desastre? Três fatores:

1. Ameaça: o fenômeno natural ou humano que pode causar dano (enchente, deslizamento, seca).
2. Vulnerabilidade: a fragilidade das pessoas e dos lugares diante dessa ameaça
3. Exposição: quantas pessoas e coisas estão na área de risco.

Quando esses três se encontram — ameaça + vulnerabilidade + exposição — o desastre acontece.

DESASTRE: QUANDO O RISCO SE CONCRETIZA

Desastre é a materialização do risco. É o rio que transborda. É o morro que desliza. É a seca que destrói as plantações.

Mas atenção: nenhum desastre é 100% natural.

Pense comigo. Uma chuva forte não é, por si só, um desastre. O desastre acontece porque alguém construiu uma casa em área de risco. Porque o poder público não fez drenagem. Porque o lixo entupiu os bueiros.

O geógrafo brasileiro Aziz Ab'Sáber dizia: "Desastre natural é aquele em que o homem não teve participação. Duvido que exista algum."

Ele tinha razão.

VULNERABILIDADE: O FATOR INVISÍVEL (MAS DECISIVO)

Aqui entra um conceito central: vulnerabilidade ambiental.

Vulnerável é quem tem menos recursos para se preparar, resistir e se recuperar de um desastre.

- Quem mora em área de risco geralmente não escolheu morar lá. Foi empurrado pelos preços altos do aluguel em áreas seguras.
- Quem perde tudo numa enchente e não tem seguro, não tem poupança, não tem parentes em outra cidade... esse demora muito mais para se reerguer.
- Quem depende do trabalho diário (feirante, diarista, ambulante) e perde um dia de trabalho por causa da chuva... esse perde também a refeição do dia.

Vulnerabilidade não é destino. É desigualdade social manifestada no território.

E veja como isso se conecta com o subtema anterior: quem consome menos é quem mais sofre com os impactos ambientais. Quem mais contribuiu para o aquecimento global não é quem está afogando nas enchentes de Moçambique ou nos deslizamentos de Petrópolis.

Injusto? Completamente. Mas é a realidade.

INSEGURANÇA AMBIENTAL: O MEDO QUE VIROU ROTINA.

Insegurança ambiental é a sensação — e a realidade — de que o ambiente ao redor não é seguro.

Pode ser a falta de água potável. Pode ser o ar poluído que causa doenças respiratórias. Pode ser o medo constante de que a próxima chuva forte vá derrubar o barranco atrás de casa.

Para milhões de pessoas no mundo, a insegurança ambiental não é exceção. É regra. É o cotidiano.

E a pior parte? Ela se retroalimenta. A insegurança gera pobreza. A pobreza empurra para áreas mais inseguras. O ciclo não se rompe sozinho.`

            text: `Chegamos ao subtema mais comentado (e talvez mais mal compreendido) dos últimos anos: as mudanças climáticas.

Vamos por partes. Sem alarmismo. Sem negacionismo. Com fatos.

O QUE SÃO MUDANÇAS CLIMÁTICAS?

Mudanças climáticas são alterações de longo prazo nos padrões de temperatura e clima do planeta.

A Terra sempre mudou de clima. Isso é natural. O problema é a velocidade da mudança atual.

Nos últimos 150 anos — um piscar de olhos na escala geológica — a temperatura média do planeta subiu cerca de 1,2°C. Parece pouco. Mas não é.

Esse 1,2°C já está:
- Derretendo geleiras que existiam há milênios.
- Elevando o nível do mar (e ameaçando cidades inteiras).
- Intensificando furacões, secas e enchentes.
- Desorganizando ecossistemas inteiros.

E a causa principal? Nós. A atividade humana. Especificamente, a queima de combustíveis fósseis (carvão, petróleo, gás) e o desmatamento.

"Mas, uma pessoa sozinha não pode fazer nada contra isso."

Verdade. Por isso existem os acordos internacionais.

OS GRANDES ACORDOS CLIMÁTICOS (UMA BREVE HISTÓRIA)

A comunidade internacional já percebeu há décadas que o clima não respeita fronteiras. O CO₂ emitido na China aquece o Brasil. A Amazônia queimada afeta a chuva na Europa.

Por isso, países se reúnem para tentar resolver juntos.

Rio 92 (ECO-92): o primeiro grande marco. Foi lá que nasceram a Convenção-Quadro das Nações Unidas sobre Mudança do Clima (UNFCCC) e a ideia de que os países ricos, maiores emissores históricos, deveriam liderar o corte de emissões.

Protocolo de Kyoto (1997): o primeiro acordo com metas obrigatórias. Mas só para países ricos. E os EUA (maior emissor da época) não ratificaram. Resultado? Funcionou pouco.

Acordo de Paris (2015): o grande marco atual. Pela primeira vez, todos os países se comprometeram — cada um com sua própria meta (chamada de NDC). O objetivo: impedir que o aquecimento ultrapasse 2°C (e, se possível, 1,5°C).

MAS SERÁ QUE ESTÁ FUNCIONANDO?

Resposta honesta: parcialmente.

As boas notícias: energias renováveis (solar, eólica) estão cada vez mais baratas. Carros elétricos estão saindo do nicho. Muitos países estão investindo pesado em descarbonização.

As más notícias: as emissões continuam subindo (embora mais devagar). As metas atuais nos levam a um aquecimento de cerca de 2,7°C — muito acima do seguro. E os países ricos ainda não cumpriram a promessa de dar US$ 100 bilhões por ano para os pobres se adaptarem.

"Então é tudo mentira? Não adianta nada?"

Não é mentira. Mas adianta? Sim, porque sem os acordos, estaríamos muito piores. A questão é que não está adiantando o suficiente. E o tempo está acabando.`

            text: `Último subtema. E talvez o mais cruel de todos. Porque ele mostra que o problema ambiental não atinge todo mundo igual.

O QUE É SEGREGAÇÃO SOCIOESPACIAL?

Segregação socioespacial é a separação de diferentes grupos sociais no espaço urbano. Traduzindo: ricos num lugar, pobres em outro.

Não é natural. Não é acidente. É produzida pelo mercado imobiliário, pelas políticas públicas (ou falta delas), pela história da cidade.

O resultado? As cidades brasileiras são máquinas de separar:

- Bairros nobres: asfalto, saneamento, coleta de lixo, áreas verdes, baixa densidade.
- Periferias: falta de infraestrutura, alta densidade, poucas áreas verdes, proximidade com áreas de risco (mangues, encostas, várzeas de rios).

E essa separação não é só geográfica. É também ambiental.

VULNERABILIDADE SOCIOAMBIENTAL: QUANDO O LUGAR ONDE VOCÊ MORA TE COLOCA EM RISCO.

Vulnerabilidade socioambiental é a sobreposição de dois fatores:

1. Desvantagem social (baixa renda, pouca escolaridade, trabalho precário)
2. Degradação ambiental (poluição, falta de saneamento, área de risco)

Quem está nesse cruzamento? Milhões de brasileiros.

O exemplo clássico: a favela na encosta do morro.

- Desvantagem social: moradores têm pouca renda, pouca organização política, pouco acesso a serviços públicos de qualidade.
- Degradação ambiental: a encosta foi desmatada para ocupação. O solo fica exposto. Quando chove forte, a terra desliza.

Não é castigo divino. É injustiça ambiental.

INJUSTIÇA AMBIENTAL: O NOME DO PROBLEMA

Injustiça ambiental é quando os custos ambientais do desenvolvimento (poluição, riscos, degradação) são suportados desproporcionalmente pelos mais pobres, enquanto os benefícios (conforto, consumo, segurança) ficam com os mais ricos.

Exemplos:

- O lixão da cidade fica perto da periferia. Quem respira o fedor e adoece são os pobres.

"Mas, eles não sabiam que não podiam construir ali?"

Sabiam. Mas onde mais iriam? O mercado imobiliário expulsa os pobres para as bordas da cidade. E as bordas são justamente as áreas de risco.`

            text: `Chegamos ao fim. Mas, espero, não ao final da reflexão.

Percorremos um caminho longo: do café da manhã ao deslizamento de terra. Das escolhas individuais aos acordos internacionais. Do consumismo à injustiça ambiental.

E o que fica?

PRIMEIRO: não existe problema ambiental separado de problema social. A crise ecológica é também uma crise de desigualdade. Não se resolve uma sem resolver a outra.

SEGUNDO: o indivíduo importa, sim. Cada escolha de consumo, cada hábito sustentável, cada ato de pressão política faz diferença. Mas não resolve sozinho. Precisamos de mudanças estruturais — nas cidades, nas leis, nos mercados, nos acordos internacionais.

TERCEIRO: a ética está no centro de tudo. Porque a questão ambiental é, no fundo, uma questão de responsabilidade. Responsabilidade com quem vive agora. Responsabilidade com quem virá depois. Responsabilidade com as outras espécies. Responsabilidade com o planeta que nos abriga.

O sociólogo alemão Ulrich Beck cunhou uma expressão que nunca me saiu da cabeça: "sociedade de risco". Vivemos numa época em que os riscos que criamos (mudanças climáticas, poluição, desastres) ameaçam a todos — mas não igualmente.

A pergunta que fica é: que sociedade queremos construir?

Uma sociedade onde os riscos são empurrados para quem já tem pouco? Ou uma sociedade onde a segurança ambiental é um direito de todos?

Uma sociedade onde o consumo é fim em si mesmo? Ou uma sociedade onde consumir é um meio para viver bem — sem destruir o que permite a vida?

Uma sociedade que reage aos desastres com comoção e esquecimento? Ou uma sociedade que previne os desastres com planejamento, justiça e solidariedade?

As respostas não estão prontas. Não estão neste texto. Estão sendo escritas agora — por cada um de nós, todos os dias, em cada escolha.

O QUE VOCÊ PODE FAZER, A PARTIR DE AGORA?

    // ======================== CONTROLE DE ESTADO ========================
    let currentPage = 0;
    let currentUtterance = null;
    let isPlaying = false;
    let currentRate = 1.0;
    let alunoNome = "";
    let alunoTurma = "";
    let alunoBimestre = "";
    
    // Elementos DOM
    const pageContentDiv = document.getElementById('pageContent');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playBtn = document.getElementById('playAudioBtn');
    const pauseBtn = document.getElementById('pauseAudioBtn');
    const stopBtn = document.getElementById('stopAudioBtn');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    // ======================== FUNÇÕES DE ATUALIZAÇÃO ========================
    function updateProgress() {
        const total = pages.length;
        const percent = ((currentPage + 1) / total) * 100;
        progressFill.style.width = `${percent}%`;
        progressText.textContent = `Página ${currentPage + 1} de ${total}`;
    }

    function iniciarLeitura() {
        const nome = document.getElementById('nomeAluno').value.trim();
        const turma = document.getElementById('turmaAluno').value.trim();
        const bimestre = document.getElementById('bimestreAluno').value.trim();
        
        if (!nome || !turma || !bimestre) {
            alert("Preencha todos os campos!");
            return;
        }
        
        alunoNome = nome;
        alunoTurma = turma;
        alunoBimestre = bimestre;
        
        document.getElementById('telaIdentificacao').classList.add('oculto');
        currentPage = 0;
        loadPage();
    }

    function loadPage() {
        const page = pages[currentPage];
        pageContentDiv.innerHTML = `<h2 style="color: #1a5f3a; margin-bottom: 15px;">${page.title}</h2><div style="text-align: justify;">${page.text.replace(/\n/g, '<br>')}</div>`;
        pageContentDiv.scrollTop = 0;
        
        prevBtn.disabled = (currentPage === 0);
        nextBtn.disabled = (currentPage === pages.length - 1);
        
        updateProgress();
        stopAudio();
    }

    // ======================== FUNÇÃO DE ENVIO ========================
    function enviarRelatorioLeitura() {
        if (!alunoNome || !alunoTurma || !alunoBimestre) {
            alert("Identificação não encontrada. Recomece a leitura.");
            return;
        }
        
        const dados = {
            nome: alunoNome,
            turma: alunoTurma,
            bimestre: alunoBimestre
        };
        
        const webhookUrl = "https://script.google.com/macros/s/AKfycbzdRPV8YN06H_9QMcjm4e_K1fqJPSyBHzf0SNBr1s3xbls2SsF8fqFeM6b7nKTQLeM/exec";
        
        fetch(webhookUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dados)
        }).then(() => {
            alert("✅ Leitura registrada! O professor foi notificado.");
            mostrarTelaEncerramento();
        }).catch(erro => {
            console.error("Erro:", erro);
            alert("Erro ao enviar. Verifique sua conexão.");
        });
    }

    // ======================== TELA DE ENCERRAMENTO ========================
    function mostrarTelaEncerramento() {
        document.querySelector('.nav-buttons').style.display = 'none';
        document.querySelector('.audio-controls').style.display = 'none';
        document.querySelector('.progress-area').style.display = 'none';
        
        pageContentDiv.innerHTML = `
            <div class="tela-encerramento">
                <h2>🎉 PARABÉNS!</h2>
                <p>Você concluiu a leitura do material. Obrigado pela dedicação aos estudos.</p>
                <p class="instrucao">Feche esta janela para encerrar.</p>
                <button class="btn-fechar" id="btnFecharJanela">❌ Fechar Janela</button>
            </div>
        `;
        
        document.getElementById('btnFecharJanela').addEventListener('click', function() {
            window.close();
            alert("Por favor, feche esta janela manualmente.");
        });
        
        stopAudio();
    }

    // ======================== FUNÇÕES DE ÁUDIO ========================
    function getCurrentText() {
        const page = pages[currentPage];
        let text = page.title + ". " + page.text;
        text = text.replace(/\n/g, ' ');
        text = text.replace(/  +/g, ' ');
        // Remove tags HTML para a leitura
        text = text.replace(/<[^>]*>/g, ' ');
        return text;
    }

    function playAudio() {
        stopAudio();
        const textToSpeak = getCurrentText();
        
        if (!window.speechSynthesis) {
            alert("Seu navegador não suporta síntese de voz.");
            return;
        }
        
        currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
        currentUtterance.lang = 'pt-BR';
        currentUtterance.rate = currentRate;
        currentUtterance.pitch = 1.0;
        
        let voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) {
            window.speechSynthesis.onvoiceschanged = () => {
                voices = window.speechSynthesis.getVoices();
                selectFemaleVoice(voices);
                window.speechSynthesis.speak(currentUtterance);
            };
        } else {
            selectFemaleVoice(voices);
            window.speechSynthesis.speak(currentUtterance);
        }
        
        isPlaying = true;
        
        currentUtterance.onend = () => {
            isPlaying = false;
            currentUtterance = null;
            
            if (currentPage < pages.length - 1) {
                setTimeout(() => {
                    currentPage++;
                    loadPage();
                    playAudio();
                }, 6000);
            }
        };
        
        currentUtterance.onerror = () => {
            isPlaying = false;
            currentUtterance = null;
        };
    }
    
    // ======================== FUNÇÃO ALTERADA ========================
    function selectFemaleVoice(voices) {
        // Lista de possíveis nomes de vozes femininas em português
        const femaleVoiceNames = [
            'Microsoft Maria',
            'Google Português brasileiro feminina',
            'Google português do Brasil feminina',
            'Microsoft Daniela',
            'Microsoft Sabrina'
        ];
        
        // Primeiro, tenta encontrar por nome específico
        for (let name of femaleVoiceNames) {
            const voice = voices.find(v => v.name === name);
            if (voice) {
                currentUtterance.voice = voice;
                return;
            }
        }
        
        // Se não encontrar por nome, procura qualquer voz feminina em português
        const femaleVoice = voices.find(voice => 
            (voice.lang === 'pt-BR' || voice.lang === 'pt') && 
            (voice.name.toLowerCase().includes('feminina') || 
             voice.name.toLowerCase().includes('female') ||
             voice.name.toLowerCase().includes('maria') ||
             voice.name.toLowerCase().includes('francisca') ||
             voice.name.toLowerCase().includes('leticia') ||
             voice.name.toLowerCase().includes('eliza') ||
             voice.name.toLowerCase().includes('microsoft') && voice.name.toLowerCase().includes('maria'))
        );
        
        if (femaleVoice) {
            currentUtterance.voice = femaleVoice;
        }
        // Se não encontrar nenhuma voz feminina específica, usa a padrão do sistema
    }

    function pauseAudio() {
        if (window.speechSynthesis && window.speechSynthesis.speaking) {
            window.speechSynthesis.pause();
            isPlaying = false;
        }
    }

    function stopAudio() {
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }
        currentUtterance = null;
        isPlaying = false;
    }

    function setSpeed(rate) {
        currentRate = rate;
        document.getElementById('speed1xBtn').classList.remove('active');
        document.getElementById('speed15xBtn').classList.remove('active');
        if (rate === 1.0) {
            document.getElementById('speed1xBtn').classList.add('active');
        } else {
            document.getElementById('speed15xBtn').classList.add('active');
        }
    }
    
    function toggleFullscreen() {
        const container = document.querySelector('.container');
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(err => {
                console.log(`Erro ao entrar em tela cheia: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    function updateFullscreenButton() {
        const btn = document.getElementById('fullscreenBtn');
        if (document.fullscreenElement) {
            btn.textContent = '✕ Sair';
        } else {
            btn.textContent = '⛶ Tela Cheia';
        }
    }

    // ======================== EVENTOS ========================
    document.getElementById('btnIniciarLeitura').addEventListener('click', iniciarLeitura);

    document.addEventListener('click', function(e) {
        if (e.target.id === 'btnEnviarRelatorio') {
            enviarRelatorioLeitura();
        }
    });   

    document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', updateFullscreenButton);

    prevBtn.addEventListener('click', () => {
        if (currentPage > 0) {
            currentPage--;
            loadPage();
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentPage < pages.length - 1) {
            currentPage++;
            loadPage();
        }
    });

    playBtn.addEventListener('click', playAudio);
    pauseBtn.addEventListener('click', pauseAudio);
    stopBtn.addEventListener('click', stopAudio);

    document.getElementById('speed1xBtn').addEventListener('click', () => setSpeed(1.0));
    document.getElementById('speed15xBtn').addEventListener('click', () => setSpeed(1.5));
    
    // ======================== INICIALIZAÇÃO ========================
    loadPage();
</script>
